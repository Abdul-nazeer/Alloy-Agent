services:
  # Backend API Service (Docker)
  - type: web
    name: alloy-agent-backend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./deployment/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: HF_MODEL_ID
        value: CodeMasterAbdul/alloy-phi3-steel-maintenance
      - key: HF_TOKEN
        sync: false
      - key: LLM_PROVIDER
        value: huggingface
      - key: ENVIRONMENT
        value: production
